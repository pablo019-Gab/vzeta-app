name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Flask App
        uses: docker/build-push-action@v4
        with:
          context: ./caso-vzeta/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest

      - name: Build and push Nginx
        uses: docker/build-push-action@v4
        with:
          context: ./caso-vzeta/nginx
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mynginx:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "caso-vzeta/docker-compose.yml"
          target: "/home/ec2-user/vzeta-app"
          strip_components: 1

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/vzeta-app
            sed -i 's/TU_USUARIO/${{ secrets.DOCKERHUB_USERNAME }}/g' docker-compose.yml
            docker compose down || true
            docker compose pull
            docker compose up -d
